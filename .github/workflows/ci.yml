name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build & test on Node ${{ matrix.node }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        node: ['22']
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm -r build

      - name: Run tests
        run: pnpm -r test
        env:
          # E2E tests set their own test tokens; this satisfies tsx dev mode if it runs
          AGENTGUARD_TOKEN: ci-placeholder-token-never-used-at-runtime

      - name: MCP package smoke test (publish contract)
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          set -e
          # Pack the mcp-server using its prepack hook (builds dist + chmod).
          # pnpm pack resolves workspace:* to concrete versions for publish.
          cd packages/mcp-server
          TARBALL=$(pnpm pack 2>&1 | tail -1)
          TARBALL_ABS="$PWD/$TARBALL"

          TMPDIR=$(mktemp -d)
          tar -xzf "$TARBALL_ABS" -C "$TMPDIR"

          # --- Structural checks (publish contract) -----------------------
          # bin file present, executable, and starts with a Node shebang.
          test -f "$TMPDIR/package/dist/index.js" \
            || { echo "FAIL: dist/index.js not in tarball"; exit 1; }
          test -x "$TMPDIR/package/dist/index.js" \
            || { echo "FAIL: dist/index.js not executable (prepack chmod missed)"; exit 1; }
          head -1 "$TMPDIR/package/dist/index.js" | grep -q "^#!/usr/bin/env node" \
            || { echo "FAIL: missing shebang"; exit 1; }

          # bin field still resolves to ./dist/index.js after publish.
          BIN_PATH=$(node -e "console.log(JSON.parse(require('fs').readFileSync('$TMPDIR/package/package.json'))['bin']['agentguard-mcp'])")
          [ "$BIN_PATH" = "./dist/index.js" ] \
            || { echo "FAIL: bin field is '$BIN_PATH', expected ./dist/index.js"; exit 1; }

          # workspace:* must be resolved to concrete version (publishable).
          if grep -q "workspace:" "$TMPDIR/package/package.json"; then
            echo "FAIL: workspace:* not resolved in publish artifact"; exit 1
          fi

          # Syntax sanity: dist/index.js parses cleanly. We deliberately do
          # NOT run it — actual startup needs npm-installed dependencies
          # (@modelcontextprotocol/sdk etc.), which only appear after a real
          # `npm install` against a published registry. End-to-end runtime
          # verification belongs to a post-publish job, not the build CI.
          node --check "$TMPDIR/package/dist/index.js" \
            || { echo "FAIL: dist/index.js syntax error"; exit 1; }

          echo "MCP smoke test PASSED (publish-contract structure)"
          rm -f "$TARBALL_ABS"
          rm -rf "$TMPDIR"
